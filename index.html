<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:700px;
            margin:20px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:6px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Credit Card Approval Prediction</h2>

<form action="/predict" method="POST">

<input type="number" name="ID" placeholder="ID" required>

<input type="number" name="CODE_GENDER" placeholder="Gender (Male=1 Female=0)" required>

<input type="number" name="FLAG_OWN_CAR" placeholder="Own Car (Yes=1 No=0)" required>

<input type="number" name="FLAG_OWN_REALTY" placeholder="Own House (Yes=1 No=0)" required>

<input type="number" name="CNT_CHILDREN" placeholder="Number of Children" required>

<input type="number" name="AMT_INCOME_TOTAL" placeholder="Annual Income" required>

<input type="number" name="NAME_INCOME_TYPE" placeholder="Income Type (Encoded)" required>

<input type="number" name="NAME_EDUCATION_TYPE" placeholder="Education Type (Encoded)" required>

<input type="number" name="NAME_FAMILY_STATUS" placeholder="Family Status (Encoded)" required>

<input type="number" name="NAME_HOUSING_TYPE" placeholder="Housing Type (Encoded)" required>

<input type="number" name="DAYS_BIRTH" placeholder="Days Birth" required>

<input type="number" name="DAYS_EMPLOYED" placeholder="Days Employed" required>

<input type="number" name="FLAG_MOBIL" placeholder="Mobile (1/0)" required>

<input type="number" name="FLAG_WORK_PHONE" placeholder="Work Phone (1/0)" required>

<input type="number" name="FLAG_PHONE" placeholder="Phone (1/0)" required>

<input type="number" name="FLAG_EMAIL" placeholder="Email (1/0)" required>

<input type="number" name="OCCUPATION_TYPE" placeholder="Occupation Type (Encoded)" required>

<input type="number" step="0.1" name="CNT_FAM_MEMBERS" placeholder="Family Members" required>

<input type="number" name="MONTHS_BALANCE" placeholder="Months Balance" required>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
